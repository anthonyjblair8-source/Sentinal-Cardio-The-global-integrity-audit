      - name: Commit and Push Sealed Manifest
        run: |
          git config --global user.name "Sentinel Cardio Keeper"
          git config --global user.email "keeper@sentinel.local"
          # Check if the file exists before attempting to stage it
          if [ -f "EXHIBIT_A_MANIFEST.json" ]; then
            git add EXHIBIT_A_MANIFEST.json
            git commit -m "ARCHITECT DEPLOYMENT: Sealed manifest successfully integrated."
            git push
          else
            echo "Warning: EXHIBIT_A_MANIFEST.json not found, skipping commit."
          fi
