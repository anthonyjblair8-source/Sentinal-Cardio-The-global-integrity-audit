name: CI Pipeline

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: List Files
        run: ls -R

      - name: Execute Sentinel Engine
        run: |
          echo "Looking for math_engine.py..."
          python math_engine.py