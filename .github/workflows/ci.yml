name: Sentinel Engine Execution
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Forensic Audit Sequence
        run: |
          echo "Initiating multi-node forensic scan..."
          # Execute the core loop with error logging
          python3 audit_loop.py || { echo "Audit loop failed at line 67"; exit 1; }
          python3 sentinel_bridge_c2.py
          python3 generate_affidavit.py
