name: CI Pipeline

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Add lines here if you have a requirements.txt, e.g., pip install -r requirements.txt

      - name: Execute Sentinel Engine
        run: |
          echo "Starting Sentinel Cardio Engine..."
          python math_engine.py
          echo "Engine execution complete."