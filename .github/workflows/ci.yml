name: Sentinel Engine Execution
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Full Audit Sequence
        run: |
          pip install -r requirements.txt
          # Core execution sequence
          python3 audit_loop.py
          python3 sentinel_bridge_c2.py
          python3 generate_affidavit.py

      - name: Finalize Repository State
        run: |
          git config --global user.name "Sentinel Cardio Keeper"
          git config --global user.email "keeper@sentinel.local"
          # Locate and stage output records dynamically
          MANIFEST=$(find . -name "EXHIBIT_A_MANIFEST.json" -print -quit)
          if [ -n "$MANIFEST" ]; then
            git add "$MANIFEST"
            git commit -m "ARCHITECT DEPLOYMENT: Full workflow synchronized and manifest locked."
            git push
          else
            echo "Pipeline complete; no new manifest to stage."
          fi

