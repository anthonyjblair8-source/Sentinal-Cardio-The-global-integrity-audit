name: Sentinel Engine Execution
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Forensic Audit Sequence
        run: |
          echo "Initiating multi-node forensic scan..."
          # Run core audit loop
          python audit_loop.py
          # Run bridge synchronization
          python sentinel_bridge_c2.py
          # Execute final affidavit generation
          python generate_affidavit.py
          echo "Audit sequence complete."
