      - name: Finalize Repository State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force clean any hidden Git state that causes SIGQUIT
          rm -rf .git/index.lock
          
          MANIFEST=$(find . -name "EXHIBIT_A_MANIFEST.json" -print -quit)
          
          if [ -n "$MANIFEST" ]; then
            git add "$MANIFEST"
            # Use '|| true' to prevent commit failure if nothing changed
            git commit -m "ARCHITECT DEPLOYMENT: CI synchronized." || true
            
            # Use a 'safe' push that handles retries if the network hits a SIGQUIT
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git push origin HEAD:main || (sleep 5 && git push origin HEAD:main)
          else
            echo "No manifest to stage; pipeline stable."
          fi
