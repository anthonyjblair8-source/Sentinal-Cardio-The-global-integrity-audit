      - name: Finalize Repository State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. REMOVE ANY STALE LOCKS FROM PREVIOUS FAILED RUNS
          rm -f .git/index.lock
          
          MANIFEST=$(find . -name "EXHIBIT_A_MANIFEST.json" -print -quit)
          
          if [ -n "$MANIFEST" ]; then
            git add "$MANIFEST"
            git commit -m "ARCHITECT DEPLOYMENT: CI synchronized and manifest locked."
            
            # 2. Push with token
            git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
          else
            echo "No manifest to stage; pipeline stable."
          fi

