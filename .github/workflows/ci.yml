name: CI Pipeline

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Find and Execute Sentinel Engine
        run: |
          echo "Scanning subdirectories for engine logic..."
          # This command finds the file wherever it is nested
          FILE_PATH=$(find . -name "math_engine.py" -print -quit)
          if [ -z "$FILE_PATH" ]; then
            echo "Error: math_engine.py still not found!"
            ls -R
            exit 1
          else
            echo "SUCCESS: Found at $FILE_PATH. Executing..."
            python "$FILE_PATH"
          fi