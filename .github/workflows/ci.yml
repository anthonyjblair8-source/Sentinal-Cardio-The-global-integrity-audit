      - name: Finalize Repository State
        run: |
          # Check if manifest exists and just print/log it for now 
          # to isolate the 128 error from the Git operation.
          MANIFEST=$(find . -name "EXHIBIT_A_MANIFEST.json" -print -quit)
          if [ -n "$MANIFEST" ]; then
            echo "Manifest found at $MANIFEST. Content:"
            cat "$MANIFEST"
          else
            echo "Pipeline complete; no manifest found to stage."
          fi
