      - name: Commit and Push Sealed Manifest
        run: |
          git config --global user.name "Sentinel Cardio Keeper"
          git config --global user.email "keeper@sentinel.local"
          # Check for both files before staging
          if [ -f "EXHIBIT_A_MANIFEST.json" ] && [ -f "FORENSIC_AFFIDAVIT.txt" ]; then
            git add EXHIBIT_A_MANIFEST.json FORENSIC_AFFIDAVIT.txt
            git commit -m "ARCHITECT DEPLOYMENT: Sealed forensic affidavit: PHCA baseline validation block."
            git push
          else
            echo "Warning: Manifest or Affidavit missing. Skipping commit to preserve system state."
          fi
