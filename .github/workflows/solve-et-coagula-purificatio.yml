name: Solve et Coagula — Purificatio Pipeline

on:
  push:
    branches:
      - main
      - dev
      - staging
      - audit
  pull_request:

jobs:
  purificatio:
    runs-on: ubuntu-latest

    steps:
      - name: 🜁 Solve — Dissolve the old state
        uses: actions/checkout@v4

      - name: 🜂 Ignite — Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🜄 Coagula — Rebind dependencies
        run: npm install

      - name: 🜃 Purificatio — Run tests
        run: npm test

      - name: 🜇 Anima — EthicalCheck placeholder
        uses: actions/github-script@v7
        with:
          script: |
            console.log("Solve et Coagula: JFrog removed. Pipeline purified.")
